# Azure DevOps CI pipeline for the IoT medallion pipeline.
#
# Runs on every push to main and on every pull request targeting main.
# The pipeline installs dependencies, runs the full test suite, and
# publishes the results to the Azure DevOps test tab.
#
# To enable this pipeline:
#   1. Commit this file to the repo root.
#   2. In Azure DevOps: Pipelines -> New pipeline -> Azure Repos Git ->
#      select this repo -> "Existing Azure Pipelines YAML file" ->
#      pick /azure-pipelines.yml.
#
# Databricks deployment (wheel upload + job trigger) can be added as a
# second stage below once the test stage passes. Use the Databricks CLI
# or the Databricks DevOps extension from the Marketplace.

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - tests/**
      - pyproject.toml
      - azure-pipelines.yml

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Test
    displayName: Lint and test
    jobs:
      - job: pytest
        displayName: Run pytest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.11"
            displayName: Set Python 3.11

          - script: pip install -e .[test]
            displayName: Install package and test dependencies

          - script: |
              python -m pytest tests/ \
                --tb=short \
                -q \
                --junitxml=test-results.xml
            displayName: Run test suite

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: test-results.xml
              testRunTitle: IoT pipeline unit tests
            displayName: Publish test results

